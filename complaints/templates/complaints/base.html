{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Complaint Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="{% static 'complaints/style.css' %}" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="{% url 'submit_complaint' %}">Complaint System</a>
      <a class="text-white" href="{% url 'complaint_list' %}">View Complaints</a>
    </div>
  </nav>
  <div class="container">
    {% if messages %}
      {% for m in messages %}<div class="alert alert-success">{{ m }}</div>{% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>

{% extends 'complaints/base.html' %}
{% block content %}
<div class="form-page-wrapper">
  <div class="form-card">
    <div class="form-card-header">
      <h3>Submit a Complaint</h3>
    </div>
    <div class="form-card-body">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary" type="submit">Submit</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
